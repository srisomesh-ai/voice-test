name: Build Voice Test APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate Android project
        run: |
          rm -rf android
          flutter create . --platforms=android --org com.bharatgps

      - name: Inject native speech MainActivity
        run: |
          PKG_DIR="android/app/src/main/kotlin/com/bharatgps/voice_test"
          mkdir -p "$PKG_DIR"
          cp MainActivity.kt "$PKG_DIR/MainActivity.kt"
          echo "MainActivity injected at $PKG_DIR"

      - name: Patch manifest (mic permission + speech queries)
        run: |
          python3 - <<'PY'
          import re
          p='android/app/src/main/AndroidManifest.xml'
          s=open(p).read()
          if 'RECORD_AUDIO' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>', s, count=1)
          if 'INTERNET' not in s:
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    <uses-permission android:name="android.permission.INTERNET"/>', s, count=1)
          if '<queries>' not in s:
              q='<queries><intent><action android:name="android.speech.RecognitionService"/></intent></queries>'
              s=re.sub(r'(<manifest[^>]*>)', r'\1\n    '+q, s, count=1)
          s=re.sub(r'android:label="[^"]*"', 'android:label="Voice Test"', s, count=1)
          open(p,'w').write(s)
          print('manifest patched')
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-test-apk
          path: build/app/outputs/flutter-apk/app-release.apk
